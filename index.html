<!DOCTYPE html>
<html>
  <head>
    <title>My VR World</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  </head>
  <body>
    <a-scene vr-mode-ui="enabled: true">

<a-box position="0 0.5 -3" width="2" depth="2" height="1" color="blue"></a-box>
<a-box position="3 1 -6" width="2" depth="2" height="1" color="blue"></a-box>
<a-box position="-3 1.5 -9" width="2" depth="2" height="1" color="blue"></a-box>

      <!-- Collectible objects -->
<a-sphere class="clickable"
          position="-2 1 -5" 
          color="gold"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2000"
          event-set__mouseenter="scale: 1.2 1.2 1.2"
          event-set__mouseleave="scale: 1 1 1"
          event-set__click="visible: false">
</a-sphere>

<a-sphere class="clickable"
          position="2 1 -6" 
          color="gold"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2000"
          event-set__mouseenter="scale: 1.2 1.2 1.2"
          event-set__mouseleave="scale: 1 1 1"
          event-set__click="visible: false">
</a-sphere>

      <!-- Sky -->
      <a-sky color="#87CEEB"></a-sky>

      <!-- Ground -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="30" height="30" color="#7BC8A4"></a-plane>

      <!-- Lighting -->
      <a-light type="directional" position="1 3 2"></a-light>
      <a-light type="ambient" intensity="0.5"></a-light>

      <!-- Player -->
<a-entity>
  <a-camera position="0 1.6 0"></a-camera>
  <a-entity laser-controls="hand: right"
            raycaster="objects: .clickable"
            line="color: red"></a-entity>
</a-entity>

    </a-scene>
  </body>
</html>
